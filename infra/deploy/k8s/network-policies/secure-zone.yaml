# 强合规区网络策略: 仅允许网关与授权服务访问 (docs/architecture/02/05 §5)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: secure-zone-ingress
  namespace: trade
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { domain: s2 }   # 网关
        - namespaceSelector:
            matchLabels: { domain: d3 }   # 投顾(适当性回调场景)
